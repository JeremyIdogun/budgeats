<svg width="1240" height="380" viewBox="0 0 1240 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="40" y1="30" x2="320" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#263B67"></stop>
      <stop offset="1" stop-color="#1B2C4D"></stop>
    </linearGradient>

    <linearGradient id="plateGrad" x1="82" y1="205" x2="245" y2="265" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58D5CD"></stop>
      <stop offset="1" stop-color="#2FAEA8"></stop>
    </linearGradient>

    <linearGradient id="loafGrad" x1="90" y1="96" x2="230" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3B44B"></stop>
      <stop offset="1" stop-color="#D78929"></stop>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F1A2F" flood-opacity="0.16"></feDropShadow>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(40 30)" filter="url(#softShadow)">
    <rect x="0" y="0" width="300" height="300" rx="72" fill="url(#bgGrad)"></rect>

    <!-- Plate base -->
    <path d="M54 240C92 220 128 214 150 214C172 214 208 220 246 240V260C207 247 174 242 150 242C126 242 93 247 54 260V240Z" fill="#153637"></path>

    <!-- Plate -->
    <path d="M68 202C95 178 122 166 150 166C178 166 205 178 232 202C201 210 176 214 150 214C124 214 99 210 68 202Z" fill="url(#plateGrad)"></path>

    <!-- Loaf -->
    <path d="M86 113C100 98 121 89 150 89C179 89 200 98 214 113C226 127 232 143 232 156C232 165 229 173 225 180C206 188 179 193 150 193C121 193 94 188 75 180C71 173 68 165 68 156C68 143 74 127 86 113Z" fill="url(#loafGrad)"></path>

    <!-- Loaf scores -->
    <path d="M117 115L107 143" stroke="#FFF7EC" stroke-width="7.5" stroke-linecap="round"></path>
    <path d="M150 108L144 144" stroke="#FFF7EC" stroke-width="7.5" stroke-linecap="round"></path>
    <path d="M183 115L179 143" stroke="#FFF7EC" stroke-width="7.5" stroke-linecap="round"></path>

    <!-- Steam / abundance accents -->
    <path d="M124 72C132 61 141 53 150 47" stroke="#EC7B4A" stroke-width="6" stroke-linecap="round"></path>
    <path d="M176 72C168 61 159 53 150 47" stroke="#EC7B4A" stroke-width="6" stroke-linecap="round"></path>

    <!-- Small abstract abundance dot -->
    <circle cx="226" cy="225" r="14" fill="#5AD8D0" opacity="0.95"></circle>
  </g>

  <!-- Wordmark -->
  <g transform="translate(390 76)">
    <text x="0" y="126" font-family="Inter, Avenir Next, Poppins, Arial, sans-serif" font-size="126" font-weight="700" letter-spacing="-3.5" fill="#1B2C4D">Loavish</text>

    <text x="6" y="192" font-family="Inter, Avenir Next, Poppins, Arial, sans-serif" font-size="31" font-weight="600" letter-spacing="2.8" fill="#30B5AE">EAT WELL. SPEND WISELY.</text>

    <rect x="5" y="213" width="485" height="4" rx="2" fill="#EC7B4A"></rect>
  </g>
</svg>